# Coding Interview Fight Club - Book
# GitHub Pages Configuration
title: "Coding Interview Fight Club"
description: "The complete guide to dominating technical interviews at top-tier companies. From poverty to TC - one algorithm at a time. Covers 465+ problems across 14 chapters in 5 languages."
url: "https://arpanpathak.github.io"
baseurl: "/CodingInterviewFightClub_Hustle_600"
markdown: kramdown
highlighter: rouge

# Night Owl Theme — custom CSS
plugins:
  - jemoji

# Custom settings
show_downloads: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "chapters"
    values:
      layout: "chapter"
