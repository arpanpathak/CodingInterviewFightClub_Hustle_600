# Coding Interview Fight Club - Book
# GitHub Pages Configuration
title: "🥊 Coding Interview Fight Club"
description: "The complete guide to dominating technical interviews at top-tier companies. From poverty to TC - one algorithm at a time. Covers 465+ problems across 14 chapters in 5 languages."
url: "https://arpanpathak.github.io"
baseurl: "/CodingInterviewFightClub_Hustle_600"
markdown: kramdown
highlighter: rouge
permalink: pretty

# Theme - we use our own custom CSS
# No remote_theme needed - our custom CSS in assets/css/book.css handles everything
plugins:
  - jemoji

# Custom settings
show_downloads: false
show_back_to_top: true

# Collections
collections:
  chapters:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "chapters"
    values:
      layout: "chapter"
      has_children: true
